<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - C3 Community</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #ff2d75;
            --accent: #f0ff00;
            --text: #ffffff;
            --bg: #0a0e17;
            --card-bg: #1a1f2d;
            --nav-bg: rgba(10, 14, 23, 0.95);
        }

        [data-theme="light"] {
            --primary: #0066ff;
            --secondary: #ff3366;
            --accent: #ffcc00;
            --text: #333333;
            --bg: #f0f5ff;
            --card-bg: #ffffff;
            --nav-bg: rgba(240, 245, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Dashboard Layout */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, rgba(30, 35, 45, 0.98), rgba(15, 20, 30, 0.98));
            padding: 2rem 0;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 1.5rem;
        }

        .sidebar-header h3 {
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tablink {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            width: 100%;
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tablink:hover {
            background: rgba(0, 240, 255, 0.1);
            color: var(--primary);
        }

        .tablink.active {
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.2), transparent);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            width: 100%;
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logout-btn:hover {
            background: rgba(255, 45, 117, 0.1);
            color: var(--secondary);
        }

        /* Content */
        .content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }

        .tabcontent {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tabcontent.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            margin-bottom: 2rem;
        }

        .section-title h2 {
            font-size: 2rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Events Grid */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .event-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .event-card:hover {
            transform: translateY(-5px);
        }

        .event-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .event-info {
            padding: 1rem;
        }

        .event-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .event-date, .event-location {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            margin: 0.3rem 0;
            opacity: 0.8;
        }

        /* Profile */
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .profile-avatar i {
            font-size: 3rem;
            color: var(--primary);
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .profile-details {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
        }

        .profile-field {
            display: flex;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .field-label {
            width: 120px;
            font-weight: 600;
            color: var(--primary);
        }

        /* Notifications */
        .notifications-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .notification-card {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 10px;
            border-left: 3px solid var(--primary);
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .notification-date {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-bottom: 0.5rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            
            .content {
                margin-left: 0;
            }
            
            .dashboard-container {
                flex-direction: column;
            }
        }

        .no-data {
            text-align: center;
            padding: 2rem;
            opacity: 0.7;
        }

        .loading-spinner {
            text-align: center;
            padding: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-user-circle"></i> C3 Dashboard</h3>
            </div>
            <button class="tablink active" onclick="openTab('joined-events')">
                <i class="fas fa-check-circle"></i> Joined Events
            </button>
            <button class="tablink" onclick="openTab('all-events')">
                <i class="fas fa-calendar-alt"></i> All Events
            </button>
            <button class="tablink" onclick="openTab('notifications')">
                <i class="fas fa-bell"></i> Notifications
            </button>
            <button class="tablink" onclick="openTab('profile')">
                <i class="fas fa-id-card"></i> Profile
            </button>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div class="content">
            <div id="joined-events" class="tabcontent active">
                <div class="section-title">
                    <h2>Your Joined Events</h2>
                </div>
                <div id="joined-events-grid" class="events-grid">
                    <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
                </div>
            </div>

            <div id="all-events" class="tabcontent">
                <div class="section-title">
                    <h2>All Events</h2>
                </div>
                <div id="all-events-grid" class="events-grid">
                    <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
                </div>
            </div>

            <div id="notifications" class="tabcontent">
                <div class="section-title">
                    <h2>Notifications</h2>
                </div>
                <div id="notifications-list" class="notifications-container">
                    <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
                </div>
            </div>

            <div id="profile" class="tabcontent">
                <div class="section-title">
                    <h2>Your Profile</h2>
                </div>
                <div class="profile-container">
                    <div id="profile-content">
                        <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading profile...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <img id="modalImage" src="" alt="" style="width: 100%; border-radius: 10px; margin: 1rem 0;">
            <p id="modalDate"></p>
            <p id="modalLocation"></p>
            <p id="modalDescription"></p>
            <button class="btn" id="joinEventBtn" onclick="joinCurrentEvent()">Join Event</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://backend-glo6.onrender.com';
        let currentEventId = null;

        // Check authentication
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            window.location.href = '/';
        }

        function openTab(tabName) {
            document.querySelectorAll('.tabcontent').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tablink').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        async function fetchAllEvents() {
            try {
                const response = await fetch(`${API_BASE_URL}/allevents`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Failed to fetch events');
                const events = await response.json();
                displayEvents(events, 'all-events-grid');
                return events;
            } catch (error) {
                console.error(error);
                document.getElementById('all-events-grid').innerHTML = '<div class="no-data">Failed to load events</div>';
                return [];
            }
        }

        async function fetchJoinedEvents() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/user/events`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Failed to fetch joined events');
                const events = await response.json();
                displayJoinedEvents(events);
                return events;
            } catch (error) {
                console.error(error);
                document.getElementById('joined-events-grid').innerHTML = '<div class="no-data">No joined events yet</div>';
                return [];
            }
        }

        function displayEvents(events, containerId) {
            const container = document.getElementById(containerId);
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="no-data">No events available</div>';
                return;
            }
            container.innerHTML = events.map(event => `
                <div class="event-card" onclick="showEventDetails('${event._id}')">
                    <img src="${event.imagelink || 'https://via.placeholder.com/300x180'}" alt="${event.name}" loading="lazy">
                    <div class="event-info">
                        <h3 class="event-title">${event.name}</h3>
                        <div class="event-date"><i class="far fa-calendar-alt"></i> ${new Date(event.date).toLocaleDateString()}</div>
                        <div class="event-location"><i class="fas fa-map-marker-alt"></i> ${event.location || 'TBA'}</div>
                    </div>
                </div>
            `).join('');
        }

        function displayJoinedEvents(events) {
            const container = document.getElementById('joined-events-grid');
            if (!events || events.length === 0) {
                container.innerHTML = '<div class="no-data">You haven\'t joined any events yet</div>';
                return;
            }
            container.innerHTML = events.map(event => `
                <div class="event-card" onclick="showEventDetails('${event.eventId?._id || event.eventId}')">
                    <img src="${event.eventImage || event.eventId?.imagelink || 'https://via.placeholder.com/300x180'}" alt="${event.eventName}" loading="lazy">
                    <div class="event-info">
                        <h3 class="event-title">${event.eventName}</h3>
                        <div class="event-date"><i class="far fa-calendar-alt"></i> ${new Date(event.joinedAt).toLocaleDateString()}</div>
                    </div>
                </div>
            `).join('');
        }

        async function fetchNotifications() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/notifications`);
                if (!response.ok) throw new Error('Failed to fetch notifications');
                const notifications = await response.json();
                displayNotifications(notifications);
            } catch (error) {
                console.error(error);
                document.getElementById('notifications-list').innerHTML = '<div class="no-data">No notifications</div>';
            }
        }

        function displayNotifications(notifications) {
            const container = document.getElementById('notifications-list');
            if (!notifications || notifications.length === 0) {
                container.innerHTML = '<div class="no-data">No notifications yet</div>';
                return;
            }
            container.innerHTML = notifications.map(notif => `
                <div class="notification-card">
                    <div class="notification-title">${notif.title}</div>
                    <div class="notification-date">${new Date(notif.date).toLocaleDateString()}</div>
                    <div class="notification-message">${notif.message}</div>
                </div>
            `).join('');
        }

        async function fetchProfile() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/user/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Failed to fetch profile');
                const user = await response.json();
                displayProfile(user);
            } catch (error) {
                console.error(error);
                document.getElementById('profile-content').innerHTML = '<div class="no-data">Failed to load profile</div>';
            }
        }

        function displayProfile(user) {
            const joinedEventsCount = user.events?.length || 0;
            document.getElementById('profile-content').innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar"><i class="fas fa-user"></i></div>
                    <h2>${user.name}</h2>
                    <p>${user.email}</p>
                </div>
                <div class="profile-stats">
                    <div class="stat-card">
                        <div class="stat-value">${joinedEventsCount}</div>
                        <div>Events Joined</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${user.isverified ? '✓' : 'Pending'}</div>
                        <div>Verification Status</div>
                    </div>
                </div>
                <div class="profile-details">
                    <div class="profile-field"><div class="field-label">Branch</div><div>${user.branch}</div></div>
                    <div class="profile-field"><div class="field-label">Batch</div><div>${user.batch}</div></div>
                    <div class="profile-field"><div class="field-label">Registration No</div><div>${user.regno}</div></div>
                    <div class="profile-field"><div class="field-label">Mobile</div><div>${user.mobileno}</div></div>
                    <div class="profile-field"><div class="field-label">Member Since</div><div>${new Date(user.createdAt).toLocaleDateString()}</div></div>
                </div>
            `;
        }

        async function showEventDetails(eventId) {
            currentEventId = eventId;
            try {
                const response = await fetch(`${API_BASE_URL}/api/events/${eventId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('Failed to fetch event details');
                const event = await response.json();
                document.getElementById('modalTitle').textContent = event.name;
                document.getElementById('modalImage').src = event.imagelink || 'https://via.placeholder.com/400x200';
                document.getElementById('modalDate').innerHTML = `<i class="far fa-calendar-alt"></i> ${new Date(event.date).toLocaleDateString()}`;
                document.getElementById('modalLocation').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${event.location || 'TBA'}`;
                document.getElementById('modalDescription').textContent = event.description || 'No description available';
                document.getElementById('eventModal').classList.add('active');
            } catch (error) {
                alert('Failed to load event details');
            }
        }

        async function joinCurrentEvent() {
            if (!currentEventId) return;
            try {
                const response = await fetch(`${API_BASE_URL}/api/events/${currentEventId}/join`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                if (response.ok) {
                    alert('Successfully joined the event!');
                    closeModal();
                    fetchJoinedEvents();
                } else {
                    alert(data.message || 'Failed to join event');
                }
            } catch (error) {
                alert('Error joining event');
            }
        }

        function closeModal() {
            document.getElementById('eventModal').classList.remove('active');
            currentEventId = null;
        }

        function logout() {
            localStorage.removeItem('jwtToken');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', () => {
            fetchAllEvents();
            fetchJoinedEvents();
            fetchNotifications();
            fetchProfile();
        });
    </script>
</body>
</html>
