<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Management - C3 Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #ff2d75;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #ffffff;
            --text-secondary: #a0a0b0;
            --bg: #0a0e17;
            --card-bg: #1a1f2d;
            --border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --primary: #0066ff;
            --secondary: #ff3366;
            --text: #333333;
            --text-secondary: #666666;
            --bg: #f5f7fe;
            --card-bg: #ffffff;
            --border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .back-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            color: var(--text);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .form-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .form-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 16px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        th {
            background: rgba(0, 240, 255, 0.05);
            color: var(--primary);
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .role-super_admin { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #333; }
        .role-core_member { background: linear-gradient(135deg, var(--primary), #0066ff); color: white; }
        .role-coordinator { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .role-sub_coordinator { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }

        .status-active { color: var(--success); }
        .status-inactive { color: var(--danger); }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-modal {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .permission-group {
            margin: 15px 0;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .permission-group h4 {
            margin-bottom: 10px;
            color: var(--primary);
        }

        .permission-item {
            display: inline-block;
            margin-right: 20px;
            margin-bottom: 10px;
        }

        .permission-item label {
            margin-left: 5px;
            cursor: pointer;
        }

        hr {
            border-color: var(--border);
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-users-cog"></i> Team Management</h1>
            <a href="admin-dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>

        <!-- Add Member Form -->
        <div class="form-card">
            <h3 class="form-title"><i class="fas fa-user-plus"></i> Add New Team Member</h3>
            <form id="addMemberForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="memberName" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="memberEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Phone (Optional)</label>
                        <input type="tel" id="memberPhone">
                    </div>
                    <div class="form-group">
                        <label>Position Title</label>
                        <input type="text" id="memberPosition" placeholder="e.g., Core Member, Coordinator">
                    </div>
                    <div class="form-group">
                        <label>Role *</label>
                        <select id="memberRole" required>
                            <option value="">Select Role</option>
                            <option value="core_member">Core Member</option>
                            <option value="coordinator">Coordinator</option>
                            <option value="sub_coordinator">Sub-Coordinator</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Profile Image URL (Optional)</label>
                        <input type="text" id="memberImage" placeholder="https://...">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Member</button>
            </form>
        </div>

        <!-- Members List -->
        <div class="table-container">
            <h3 style="padding: 16px;">📋 Team Members</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Position</th>
                        <th>Status</th>
                        <th>Last Login</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="membersTableBody">
                    <tr><td colspan="7" class="loading"><i class="fas fa-spinner fa-spin"></i> Loading team members...<\/td><\/tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Permission Modal -->
    <div id="permissionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-lock"></i> Edit Permissions</h3>
                <span class="close-modal" onclick="closePermissionModal()">&times;</span>
            </div>
            <div id="permissionForm">
                <input type="hidden" id="permMemberId">
                <div class="permission-group">
                    <h4>📅 Events</h4>
                    <div class="permission-item"><input type="checkbox" id="permEventsCreate"> <label>Create</label></div>
                    <div class="permission-item"><input type="checkbox" id="permEventsEdit"> <label>Edit</label></div>
                    <div class="permission-item"><input type="checkbox" id="permEventsDelete"> <label>Delete</label></div>
                </div>
                <div class="permission-group">
                    <h4>🔔 Notifications</h4>
                    <div class="permission-item"><input type="checkbox" id="permNotifCreate"> <label>Create</label></div>
                    <div class="permission-item"><input type="checkbox" id="permNotifDelete"> <label>Delete</label></div>
                </div>
                <div class="permission-group">
                    <h4>📸 Gallery</h4>
                    <div class="permission-item"><input type="checkbox" id="permGalleryUpload"> <label>Upload</label></div>
                    <div class="permission-item"><input type="checkbox" id="permGalleryDelete"> <label>Delete</label></div>
                </div>
                <div class="permission-group">
                    <h4>👥 Members</h4>
                    <div class="permission-item"><input type="checkbox" id="permMembersView"> <label>View</label></div>
                    <div class="permission-item"><input type="checkbox" id="permMembersDelete"> <label>Delete</label></div>
                </div>
                <div class="permission-group">
                    <h4>🏷️ Categories</h4>
                    <div class="permission-item"><input type="checkbox" id="permCatsCreate"> <label>Create</label></div>
                    <div class="permission-item"><input type="checkbox" id="permCatsEdit"> <label>Edit</label></div>
                    <div class="permission-item"><input type="checkbox" id="permCatsDelete"> <label>Delete</label></div>
                </div>
                <div class="permission-group">
                    <h4>📋 Nav Items</h4>
                    <div class="permission-item"><input type="checkbox" id="permNavCreate"> <label>Create</label></div>
                    <div class="permission-item"><input type="checkbox" id="permNavEdit"> <label>Edit</label></div>
                    <div class="permission-item"><input type="checkbox" id="permNavDelete"> <label>Delete</label></div>
                </div>
                <!-- ✅ NEW: Certificates Permission -->
                <div class="permission-group">
                    <h4>📜 Certificates</h4>
                    <div class="permission-item"><input type="checkbox" id="permCertUpload"> <label>Upload Certificate</label></div>
                    <div class="permission-item"><input type="checkbox" id="permCertDelete"> <label>Delete Certificate</label></div>
                </div>
                <hr>
                <button class="btn btn-primary" onclick="savePermissions()"><i class="fas fa-save"></i> Save Permissions</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://backend-glo6.onrender.com';
        const adminToken = localStorage.getItem('adminToken');
        
        if (!adminToken) {
            window.location.href = 'admin-login.html';
        }

        let currentEditingMember = null;

        // Theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Load team members
        async function loadMembers() {
            const tbody = document.getElementById('membersTableBody');
            tbody.innerHTML = '<td><td colspan="7" class="loading"><i class="fas fa-spinner fa-spin"></i> Loading team members...<\/td><\/tr>';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/team/team-members`, {
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const members = data.members || (Array.isArray(data) ? data : []);
                
                if (members.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="loading">No team members found. Add your first member above!<\/td><\/tr>';
                    return;
                }
                
                displayMembers(members);
            } catch (error) {
                console.error('Error:', error);
                tbody.innerHTML = `<tr><td colspan="7" class="loading">Failed to load members: ${error.message}<\/td><\/tr>`;
            }
        }

        function displayMembers(members) {
            const tbody = document.getElementById('membersTableBody');
            let html = '';
            
            for (const member of members) {
                const roleClass = `role-${member.role}`;
                const roleName = member.role?.replace('_', ' ').toUpperCase() || 'UNKNOWN';
                const statusClass = member.isActive ? 'status-active' : 'status-inactive';
                const statusText = member.isActive ? 'Active' : 'Inactive';
                const lastLogin = member.lastLogin ? new Date(member.lastLogin).toLocaleDateString() : 'Never';
                
                html += `
                    <tr>
                        <td><strong>${escapeHtml(member.name)}</strong></td>
                        <td>${escapeHtml(member.email)}</td>
                        <td><span class="role-badge ${roleClass}">${roleName}</span></td>
                        <td>${escapeHtml(member.position || '-')}</td>
                        <td class="${statusClass}">${statusText}</td>
                        <td>${lastLogin}</td>
                        <td class="action-buttons">
                            <button class="btn btn-warning btn-sm" onclick="editPermissions('${member._id}')"><i class="fas fa-lock"></i> Permissions</button>
                            <button class="btn btn-primary btn-sm" onclick="editMember('${member._id}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteMember('${member._id}')"><i class="fas fa-trash"></i> Delete</button>
                        </td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        }

        // Add member
        document.getElementById('addMemberForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const memberData = {
                name: document.getElementById('memberName').value,
                email: document.getElementById('memberEmail').value,
                phone: document.getElementById('memberPhone').value,
                position: document.getElementById('memberPosition').value,
                role: document.getElementById('memberRole').value,
                profileImage: document.getElementById('memberImage').value
            };
            
            if (!memberData.name || !memberData.email || !memberData.role) {
                alert('Please fill required fields');
                return;
            }
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/team/team-members`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + adminToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(memberData)
                });
                
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.message || 'Failed to add member');
                
                alert('✅ Member added successfully!');
                e.target.reset();
                loadMembers();
                
            } catch (error) {
                alert('❌ ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Add Member';
            }
        });

        // Edit permissions
        window.editPermissions = async function(memberId) {
            console.log('Fetching member:', memberId);
            try {
                const response = await fetch(`${API_BASE_URL}/api/team/team-member/${memberId}`, {
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const member = await response.json();
                currentEditingMember = member;
                document.getElementById('permMemberId').value = memberId;
                
                const perms = member.permissions || {};
                
                // Events
                document.getElementById('permEventsCreate').checked = perms.events?.create || false;
                document.getElementById('permEventsEdit').checked = perms.events?.edit || false;
                document.getElementById('permEventsDelete').checked = perms.events?.delete || false;
                
                // Notifications
                document.getElementById('permNotifCreate').checked = perms.notifications?.create || false;
                document.getElementById('permNotifDelete').checked = perms.notifications?.delete || false;
                
                // Gallery
                document.getElementById('permGalleryUpload').checked = perms.gallery?.upload || false;
                document.getElementById('permGalleryDelete').checked = perms.gallery?.delete || false;
                
                // Members
                document.getElementById('permMembersView').checked = perms.members?.view || false;
                document.getElementById('permMembersDelete').checked = perms.members?.delete || false;
                
                // Categories
                document.getElementById('permCatsCreate').checked = perms.categories?.create || false;
                document.getElementById('permCatsEdit').checked = perms.categories?.edit || false;
                document.getElementById('permCatsDelete').checked = perms.categories?.delete || false;
                
                // Nav Items
                document.getElementById('permNavCreate').checked = perms.navItems?.create || false;
                document.getElementById('permNavEdit').checked = perms.navItems?.edit || false;
                document.getElementById('permNavDelete').checked = perms.navItems?.delete || false;
                
                // ✅ NEW: Certificates
                document.getElementById('permCertUpload').checked = perms.certificates?.upload || false;
                document.getElementById('permCertDelete').checked = perms.certificates?.delete || false;
                
                document.getElementById('permissionModal').classList.add('active');
                
            } catch (error) {
                console.error('Permission error:', error);
                alert('❌ Failed to load member permissions: ' + error.message);
            }
        };

        window.savePermissions = async function() {
            const memberId = document.getElementById('permMemberId').value;
            
            const permissions = {
                events: {
                    create: document.getElementById('permEventsCreate').checked,
                    edit: document.getElementById('permEventsEdit').checked,
                    delete: document.getElementById('permEventsDelete').checked
                },
                notifications: {
                    create: document.getElementById('permNotifCreate').checked,
                    delete: document.getElementById('permNotifDelete').checked
                },
                gallery: {
                    upload: document.getElementById('permGalleryUpload').checked,
                    delete: document.getElementById('permGalleryDelete').checked
                },
                members: {
                    view: document.getElementById('permMembersView').checked,
                    delete: document.getElementById('permMembersDelete').checked
                },
                categories: {
                    create: document.getElementById('permCatsCreate').checked,
                    edit: document.getElementById('permCatsEdit').checked,
                    delete: document.getElementById('permCatsDelete').checked
                },
                navItems: {
                    create: document.getElementById('permNavCreate').checked,
                    edit: document.getElementById('permNavEdit').checked,
                    delete: document.getElementById('permNavDelete').checked
                },
                certificates: {
                    upload: document.getElementById('permCertUpload').checked,
                    delete: document.getElementById('permCertDelete').checked
                },
                teamManagement: {
                    view: false,
                    edit: false
                }
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/team/team-members/${memberId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'Bearer ' + adminToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ permissions: permissions })
                });
                
                if (!response.ok) throw new Error('Failed to save permissions');
                
                alert('✅ Permissions saved successfully!');
                closePermissionModal();
                loadMembers();
                
            } catch (error) {
                alert('❌ ' + error.message);
            }
        };

        window.editMember = async function(memberId) {
            const newName = prompt('Enter new name:');
            if (!newName) return;
            
            const newPosition = prompt('Enter position:', 'Team Member');
            const newRole = prompt('Enter role (core_member/coordinator/sub_coordinator):', 'sub_coordinator');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/team/team-members/${memberId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'Bearer ' + adminToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: newName, position: newPosition, role: newRole })
                });
                
                if (!response.ok) throw new Error('Failed to update');
                
                alert('✅ Member updated!');
                loadMembers();
                
            } catch (error) {
                alert('❌ ' + error.message);
            }
        };

        window.deleteMember = async function(memberId) {
            if (!confirm('⚠️ Are you sure you want to delete this member?')) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/team/team-members/${memberId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                
                if (!response.ok) throw new Error('Failed to delete');
                
                alert('✅ Member deleted successfully');
                loadMembers();
                
            } catch (error) {
                alert('❌ ' + error.message);
            }
        };

        window.closePermissionModal = function() {
            document.getElementById('permissionModal').classList.remove('active');
        };

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load members on page load
        loadMembers();
    </script>
</body>
</html>
