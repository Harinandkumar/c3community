<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gallery - Creative Coding Community</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #ff2d75;
            --text: #ffffff;
            --text-secondary: #a0a0b0;
            --bg: #0a0e17;
            --card-bg: #141824;
            --card-bg-hover: #1c2235;
            --border: rgba(255, 255, 255, 0.07);
            --border-hover: rgba(0, 240, 255, 0.35);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.35);
            --shadow-hover: 0 12px 40px rgba(0, 240, 255, 0.12);
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --primary: #0057d9;
            --secondary: #e8004d;
            --text: #111827;
            --text-secondary: #4b5563;
            --bg: #f0f4ff;
            --card-bg: #ffffff;
            --card-bg-hover: #f5f8ff;
            --border: rgba(0, 0, 0, 0.07);
            --border-hover: rgba(0, 87, 217, 0.35);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 40px rgba(0, 87, 217, 0.12);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--primary), var(--secondary)); border-radius: 10px; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .gallery-header {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            padding: 15px 28px;
            border-bottom: 1px solid var(--border);
        }

        [data-theme="light"] .gallery-header {
            background: rgba(255, 255, 255, 0.92);
        }

        .gallery-header .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .gallery-header .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: var(--transition);
        }

        .gallery-header .logo:hover { opacity: 0.85; }
        .gallery-header .logo img { width: 42px; height: 42px; filter: drop-shadow(0 0 6px rgba(0, 240, 255, 0.4)); }

        .gallery-header .logo h1 {
            font-size: 1.2rem;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 9px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.88rem;
            transition: var(--transition);
            box-shadow: 0 4px 16px rgba(0, 240, 255, 0.2);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 240, 255, 0.35);
        }

        /* ===== MAIN CONTENT ===== */
        .gallery-main {
            padding: 95px 28px 70px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-title {
            text-align: center;
            margin-bottom: 36px;
        }

        .gallery-title h2 {
            font-size: 2.4rem;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .gallery-title p {
            color: var(--text-secondary);
            margin-top: 10px;
            font-size: 0.95rem;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 26px;
            padding: 14px 20px;
            background: var(--card-bg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 14px;
        }

        .image-count {
            font-size: 0.88rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .image-count i { color: var(--primary); }

        .image-count span {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.2rem;
        }

        /* ===== SEARCH BOX ===== */
        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 18px;
            transition: var(--transition);
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.1);
        }

        .search-box i { color: var(--text-secondary); font-size: 0.88rem; }

        .search-box input {
            background: none;
            border: none;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            width: 210px;
            font-family: inherit;
        }

        .search-box input::placeholder { color: var(--text-secondary); }

        /* ===== CATEGORY FILTERS ===== */
        .category-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .filter-btn {
            padding: 8px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 240, 255, 0.06);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 16px rgba(0, 240, 255, 0.25);
        }

        /* ===== GALLERY GRID ===== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 22px;
        }

        .gallery-item {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            background: var(--card-bg);
            border: 1px solid var(--border);
            transition: var(--transition);
            animation: fadeInUp 0.45s ease forwards;
            opacity: 0;
            box-shadow: var(--shadow-card);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gallery-item:hover {
            transform: translateY(-7px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-hover);
        }

        .gallery-item img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg);
            pointer-events: none;
            display: block;
        }

        .gallery-item:hover img { transform: scale(1.05); }

        .gallery-item img.lazy { opacity: 0; transition: opacity 0.4s; }
        .gallery-item img.lazy.loaded { opacity: 1; }

        /* ===== CATEGORY BADGE ===== */
        .category-badge {
            position: absolute;
            top: 14px; left: 14px;
            padding: 4px 13px;
            background: rgba(10, 14, 23, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            z-index: 2;
            pointer-events: none;
            letter-spacing: 0.3px;
        }

        /* ===== GALLERY OVERLAY ===== */
        .gallery-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(5, 8, 20, 0.92) 0%, rgba(5, 8, 20, 0.5) 60%, transparent 100%);
            padding: 20px 18px 16px;
            transform: translateY(100%);
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .gallery-item:hover .gallery-overlay { transform: translateY(0); }

        .gallery-overlay h3 {
            color: white;
            font-size: 0.88rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gallery-overlay p { font-size: 0.75rem; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 5px; }

        /* ===== LIGHTBOX ===== */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(4, 6, 14, 0.97);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }

        .lightbox.active {
            display: flex;
            animation: lightboxIn 0.25s ease;
        }

        @keyframes lightboxIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            cursor: default;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 83vh;
            border-radius: var(--radius-sm);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 240, 255, 0.1);
            display: block;
        }

        .lightbox-close {
            position: absolute;
            top: -48px; right: 0;
            font-size: 1.8rem;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            width: 38px; height: 38px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
            z-index: 10;
        }

        .lightbox-close:hover { color: white; background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }

        .lightbox-prev, .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
            z-index: 10;
        }

        .lightbox-prev { left: -65px; }
        .lightbox-next { right: -65px; }

        .lightbox-prev:hover, .lightbox-next:hover {
            background: var(--primary);
            color: var(--bg);
            border-color: transparent;
            transform: translateY(-50%) scale(1.06);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .lightbox-caption {
            text-align: center;
            margin-top: 14px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .lightbox-counter {
            position: absolute;
            top: -44px; left: 0;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }

        /* ===== LOADING & EMPTY ===== */
        .loading-spinner {
            text-align: center;
            padding: 60px;
            color: var(--primary);
            font-size: 0.95rem;
        }

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: var(--text-secondary);
        }

        .empty-state i { font-size: 44px; margin-bottom: 16px; display: block; opacity: 0.4; }
        .empty-state p { font-size: 0.95rem; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); }
        }

        @media (max-width: 992px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 18px; }
            .gallery-title h2 { font-size: 2rem; }
            .lightbox-prev { left: 8px; }
            .lightbox-next { right: 8px; }
        }

        @media (max-width: 768px) {
            .gallery-header .logo h1 { display: none; }
            .gallery-header { padding: 12px 18px; }
            .gallery-main { padding: 78px 16px 44px; }
            .gallery-title h2 { font-size: 1.7rem; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
            .gallery-item img { height: 210px; }
            .stats-bar { flex-direction: column; align-items: flex-start; }
            .search-box { width: 100%; }
            .search-box input { width: 100%; }
            .category-filters { justify-content: flex-start; }
            .filter-btn { padding: 6px 15px; font-size: 0.8rem; }
            .lightbox-close { top: -44px; width: 34px; height: 34px; font-size: 1.4rem; }
            .lightbox-prev, .lightbox-next { width: 40px; height: 40px; font-size: 1rem; }
        }

        @media (max-width: 576px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-item img { height: 215px; }
            .stats-bar { padding: 12px 14px; }
            .filter-btn { padding: 5px 13px; font-size: 0.78rem; }
            .lightbox-caption { font-size: 0.78rem; }
        }

        @media (max-width: 480px) {
            .gallery-main { padding: 68px 12px 32px; }
            .gallery-title h2 { font-size: 1.4rem; }
            .gallery-title p { font-size: 0.82rem; }
            .category-badge { font-size: 10px; padding: 3px 10px; }
        }

        @media (max-width: 768px) and (orientation: landscape) {
            .gallery-main { padding: 68px 16px 30px; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); }
            .gallery-item img { height: 195px; }
            .lightbox-content img { max-height: 68vh; }
        }
    </style>
</head>
<body>
    <header class="gallery-header">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/img/logowithoutname.png" alt="logo">
                <h1>Creative Coding Community</h1>
            </a>
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </header>

    <main class="gallery-main">
        <div class="gallery-title">
            <h2><i class="fas fa-images"></i> Community Gallery</h2>
            <p>Explore moments from our events, workshops, and community gatherings</p>
        </div>
        
        <div class="stats-bar">
            <div class="image-count">
                <i class="fas fa-images"></i> <span id="imageCount">0</span> images in gallery
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search images...">
            </div>
        </div>
        
        <div class="category-filters" id="categoryFilters">
            <button class="filter-btn active" data-category="all">All</button>
            <div class="loading-spinner" style="padding: 10px;"><i class="fas fa-spinner fa-spin"></i> Loading categories...</div>
        </div>
        
        <div class="gallery-grid" id="galleryGrid">
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading images...</div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightboxClose">&times;</button>
            <div class="lightbox-counter" id="lightboxCounter"></div>
            <button class="lightbox-prev" id="lightboxPrev"><i class="fas fa-chevron-left"></i></button>
            <img src="" alt="" id="lightboxImg">
            <button class="lightbox-next" id="lightboxNext"><i class="fas fa-chevron-right"></i></button>
            <div class="lightbox-caption" id="lightboxCaption"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://backend-glo6.onrender.com';
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        const staticImages = [
            { src: "assets/img/event.jpg", title: "Intra College Coding Competition", date: "2024", category: "events" },
            { src: "assets/img/4th.jpg", title: "Recruitment 2k23 Batch", date: "2023", category: "recruitment" },
            { src: "assets/img/355.jpg", title: "Recruitment 2k23 Batch", date: "2023", category: "recruitment" },
            { src: "assets/recyuitment1.jpg", title: "Recruitment Interview", date: "2023", category: "recruitment" },
            { src: "assets/img/3.png", title: "Workshop", date: "2023", category: "workshops" },
            { src: "assets/img/ui ux gallery.jpg", title: "UI/UX Arena", date: "2024", category: "competitions" },
            { src: "assets/img/quiz clash photo.jpg", title: "QUIZ CLASH", date: "2024", category: "competitions" }
        ];
        
        let categoryColors = {
            'events': '#00f0ff', 'workshops': '#f0ff00',
            'competitions': '#ff2d75', 'recruitment': '#10b981', 'other': '#888888'
        };
        
        let allImages = [], currentImageIndex = 0, currentFilter = 'all';
        let currentSearch = '', currentFilteredImages = [], dynamicCategories = [];
        let touchStartX = 0, touchEndX = 0;
        let lazyImageObserver;
        
        function initLazyLoading() {
            if ('IntersectionObserver' in window) {
                lazyImageObserver = new IntersectionObserver(entries => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            const src = img.dataset.src;
                            if (src) {
                                img.src = src;
                                img.onload = () => img.classList.add('loaded');
                                img.removeAttribute('data-src');
                            }
                            lazyImageObserver.unobserve(img);
                        }
                    });
                }, { rootMargin: '50px' });
            }
        }
        
        function observeLazyImages() {
            if (!lazyImageObserver) return;
            document.querySelectorAll('img.lazy').forEach(img => lazyImageObserver.observe(img));
        }
        
        async function loadCategories() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/public/categories`);
                if (res.ok) dynamicCategories = await res.json();
                renderCategoryFilters();
            } catch { renderCategoryFilters(); }
        }
        
        function renderCategoryFilters() {
            const filterContainer = document.getElementById('categoryFilters');
            if (!filterContainer) return;
            
            let html = '<button class="filter-btn active" data-category="all">All</button>';
            
            dynamicCategories.forEach(cat => {
                if (cat.isActive !== false) {
                    html += `<button class="filter-btn" data-category="${escapeHtml(cat.name)}">${cat.icon} ${escapeHtml(cat.name)}</button>`;
                    categoryColors[cat.name] = cat.color;
                }
            });
            
            ['events', 'workshops', 'competitions', 'recruitment', 'other'].forEach(catName => {
                if (!dynamicCategories.some(c => c.name === catName)) {
                    const icons = { events: '🎯', workshops: '💻', competitions: '🏆', recruitment: '📢' };
                    html += `<button class="filter-btn" data-category="${catName}">${icons[catName] || '📸'} ${catName}</button>`;
                }
            });
            
            filterContainer.innerHTML = html;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.category;
                    currentImageIndex = 0;
                    filterAndDisplayImages();
                });
            });
        }
        
        async function loadGallery() {
            const container = document.getElementById('galleryGrid');
            container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading images...</div>';
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/public/gallery`);
                let cloudinaryImages = [];
                if (res.ok) {
                    const raw = await res.json();
                    cloudinaryImages = raw.map(img => ({
                        ...img,
                        src: img.cloudinaryUrl,
                        title: img.title,
                        date: new Date(img.uploadDate).toLocaleDateString(),
                        category: img.category || 'events',
                        isCloudinary: true
                    }));
                }
                allImages = [...staticImages, ...cloudinaryImages];
            } catch {
                allImages = [...staticImages];
            }
            
            updateImageCount();
            filterAndDisplayImages();
        }
        
        function updateImageCount() {
            const el = document.getElementById('imageCount');
            if (el) el.textContent = allImages.length;
        }
        
        function filterAndDisplayImages() {
            let filtered = [...allImages];
            if (currentFilter !== 'all') filtered = filtered.filter(img => img.category === currentFilter);
            if (currentSearch) filtered = filtered.filter(img => img.title.toLowerCase().includes(currentSearch.toLowerCase()));
            currentFilteredImages = filtered;
            displayGallery(filtered);
        }
        
        function getCategoryIcon(cat) {
            const dc = dynamicCategories.find(c => c.name === cat);
            if (dc) return dc.icon;
            return { events: '🎯', workshops: '💻', competitions: '🏆', recruitment: '📢' }[cat] || '📸';
        }
        
        function getCategoryColor(cat) {
            const dc = dynamicCategories.find(c => c.name === cat);
            if (dc) return dc.color;
            return categoryColors[cat] || '#888888';
        }
        
        function displayGallery(images) {
            const container = document.getElementById('galleryGrid');
            
            if (!images || images.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-images"></i><p>No images found. Try different search or filter.</p></div>';
                return;
            }
            
            let html = '';
            images.forEach((img, i) => {
                const src = img.src || img.cloudinaryUrl;
                const icon = getCategoryIcon(img.category);
                const color = getCategoryColor(img.category);
                html += `
                    <div class="gallery-item" onclick="openLightbox(${i})">
                        <div class="category-badge" style="color:${color};border:1px solid ${color}">${icon} ${img.category}</div>
                        <img class="lazy" data-src="${src}" alt="${escapeHtml(img.title)}" onerror="this.src='assets/img/default-event.jpg'">
                        <div class="gallery-overlay">
                            <h3>${escapeHtml(img.title)}</h3>
                            <p><i class="far fa-calendar-alt"></i> ${img.date}</p>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            initLazyLoading();
            observeLazyImages();
            document.querySelectorAll('.gallery-item').forEach((item, idx) => {
                item.style.animationDelay = (idx * 0.04) + 's';
            });
        }
        
        function openLightbox(index) {
            currentImageIndex = index;
            updateLightboxImage();
            const lb = document.getElementById('lightbox');
            if (lb) { lb.classList.add('active'); document.body.style.overflow = 'hidden'; }
        }
        
        function updateLightboxImage() {
            const curr = currentFilteredImages[currentImageIndex];
            if (curr) {
                const src = curr.src || curr.cloudinaryUrl;
                const icon = getCategoryIcon(curr.category);
                const img = document.getElementById('lightboxImg');
                const caption = document.getElementById('lightboxCaption');
                const counter = document.getElementById('lightboxCounter');
                if (img) img.src = src;
                if (caption) caption.innerHTML = `<strong>${escapeHtml(curr.title)}</strong> &nbsp;|&nbsp; 📅 ${curr.date} &nbsp;|&nbsp; ${icon} ${curr.category}`;
                if (counter) counter.textContent = `${currentImageIndex + 1} / ${currentFilteredImages.length}`;
            }
        }
        
        function nextImage() {
            if (!currentFilteredImages.length) return;
            currentImageIndex = (currentImageIndex + 1) % currentFilteredImages.length;
            updateLightboxImage();
        }
        
        function prevImage() {
            if (!currentFilteredImages.length) return;
            currentImageIndex = (currentImageIndex - 1 + currentFilteredImages.length) % currentFilteredImages.length;
            updateLightboxImage();
        }
        
        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            if (lb) { lb.classList.remove('active'); document.body.style.overflow = 'auto'; }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Event listeners
        document.getElementById('searchInput')?.addEventListener('input', e => {
            currentSearch = e.target.value;
            filterAndDisplayImages();
        });
        
        document.getElementById('lightboxClose')?.addEventListener('click', closeLightbox);
        document.getElementById('lightboxPrev')?.addEventListener('click', prevImage);
        document.getElementById('lightboxNext')?.addEventListener('click', nextImage);
        
        document.getElementById('lightbox')?.addEventListener('click', e => {
            if (e.target === document.getElementById('lightbox')) closeLightbox();
        });
        
        const lbContent = document.querySelector('.lightbox-content');
        if (lbContent) {
            lbContent.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
            lbContent.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                if (touchEndX < touchStartX - 50) nextImage();
                else if (touchEndX > touchStartX + 50) prevImage();
            }, false);
        }
        
        document.addEventListener('keydown', e => {
            const lb = document.getElementById('lightbox');
            if (lb?.classList.contains('active')) {
                if (e.key === 'ArrowLeft') { e.preventDefault(); prevImage(); }
                else if (e.key === 'ArrowRight') { e.preventDefault(); nextImage(); }
                else if (e.key === 'Escape') { e.preventDefault(); closeLightbox(); }
            }
        });
        
        async function init() {
            await loadCategories();
            await loadGallery();
        }
        
        init();
    </script>
</body>
</html>
